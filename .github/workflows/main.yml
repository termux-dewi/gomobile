name: Build WG Engine
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Environment & Tools
        run: |
          # Install tools ke path yang benar
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          
          # Tambahkan binary ke PATH
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build with GOPATH Mode
        run: |
          # Matikan mode module agar gomobile tidak bingung mencari go.mod
          export GO111MODULE=off
          
          # Download package ke GOPATH secara manual
          go get -d golang.org/x/mobile/bind
          go get -d golang.zx2c4.com/wireguard
          
          # Jalankan bind
          gomobile bind -v -target=android/arm,android/arm64 -androidapi 21 -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine-library
          path: wgengine.aar
