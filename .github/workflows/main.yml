name: Build WG Engine

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' # Harus 1.25 agar mendukung library mobile terbaru
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile (latest stable)
        run: |
          # Gunakan versi terbaru agar tidak error 'iter' atau 'unrecognized import'
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          export PATH=$(go env GOPATH)/bin:$PATH
          gomobile init

      - name: Prepare Dependencies
        run: |
          # Bersihkan cache modul yang rusak
          go clean -modcache
          
          # Hapus dan buat ulang go.mod agar sinkron dengan Go 1.25
          rm -f go.mod go.sum
          go mod init wgengine
          
          # Ambil library Wireguard dan Mobile terbaru
          go get golang.zx2c4.com/wireguard@latest
          go get golang.org/x/mobile/bind@latest
          
          go mod tidy
          # Gunakan vendor agar gomobile pasti menemukan package bind
          go mod vendor

      - name: Build AAR
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH

          # Gunakan -mod=vendor agar gomobile menggunakan folder vendor lokal
          gomobile bind -v \
            -target=android \
            -androidapi 21 \
            -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine
          path: wgengine.aar
