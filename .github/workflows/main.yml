name: Build WireGuard gRPC AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' # Upgrade ke versi 1.25 sesuai kebutuhan library terbaru
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV

      - name: Initialize Go Module First
        run: |
          # Buat module di awal agar 'go get' diizinkan
          rm -f go.mod go.sum
          go mod init vpnengine
          
      - name: Install Tools & Dependencies
        run: |
          # Install binary tools
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # Daftarkan ke PATH
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          
          # Sekarang aman menjalankan go get karena sudah ada go.mod
          go get golang.org/x/mobile/bind
          go get golang.zx2c4.com/wireguard
          go get google.golang.org/grpc
          
      - name: Build Preparation
        run: |
          go mod tidy
          # Jalankan gomobile init dengan path lengkap
          $(go env GOPATH)/bin/gomobile init

      - name: Build Fat AAR (ARM & ARM64)
        run: |
          export ANDROID_NDK_HOME=${{ env.NDK_PATH }}
          # Pastikan package path benar (.)
          $(go env GOPATH)/bin/gomobile bind -target android/arm,android/arm64 -androidapi 21 -v -o vpnengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpnengine-aar
          path: vpnengine.aar
