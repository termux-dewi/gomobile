name: Build WG Engine

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: android-actions/setup-android@v3

      - name: Install gomobile (stable version)
        run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20230818142259-3c911d8e3eda
          go install golang.org/x/mobile/cmd/gobind@v0.0.0-20230818142259-3c911d8e3eda
          
          export PATH=$(go env GOPATH)/bin:$PATH
          gomobile init

      - name: Prepare Dependencies
        run: |
          go clean -modcache

          go get golang.org/x/mobile@v0.0.0-20230818142259-3c911d8e3eda
          go mod tidy

      - name: Build AAR
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH

          gomobile bind \
            -target=android \
            -androidapi 21 \
            -o wgengine.aar .

      - uses: actions/upload-artifact@v4
        with:
          name: wgengine
          path: wgengine.aar 
