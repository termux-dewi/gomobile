name: Build WG Engine
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Install Gomobile tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Prepare Dependencies
        run: |
          if [ ! -f go.mod ]; then
            go mod init wgengine
          fi
          # Ambil semua dependency yang dibutuhkan
          go get golang.org/x/mobile/bind
          go get golang.zx2c4.com/wireguard
          go mod tidy
          # Trik Utama: Masukkan semua library ke folder 'vendor'
          go mod vendor

      - name: Build AAR
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          # Tambahkan flag -v agar kita bisa melihat progress detail
          # Kita gunakan titik (.) untuk menandai build dari folder saat ini
          gomobile bind -v -target=android/arm,android/arm64 -androidapi 21 -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine-library
          path: wgengine.aar
