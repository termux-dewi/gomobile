name: Build WireGuard gRPC AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Menggunakan versi terbaru yang stabil
          check-latest: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        run: |
          ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          echo "NDK_PATH=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "NDK_BIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Install Gomobile Tools
        run: |
          # Instal binary gomobile dan gobind
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Prepare Go Module and Dependencies
        run: |
          # Bersihkan dan init ulang module
          rm -f go.mod go.sum
          go mod init vpnengine
          
          # Download source code yang dibutuhkan gomobile bind
          go get golang.org/x/mobile/bind
          go get golang.zx2c4.com/wireguard
          go get google.golang.org/grpc
          go get golang.org/x/net/context
          
          go mod tidy
          
          # Inisialisasi gomobile setelah PATH terdaftar
          $(go env GOPATH)/bin/gomobile init

      - name: Build Fat AAR (ARM & ARM64)
        run: |
          export ANDROID_NDK_HOME=${{ env.NDK_PATH }}
          export PATH=$PATH:${{ env.NDK_BIN }}
          
          # Perintah bind utama
          gomobile bind -target android/arm,android/arm64 -androidapi 21 -v -o vpnengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpnengine-aar
          path: vpnengine.aar
