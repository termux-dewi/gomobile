name: Build WG Engine
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' # Menggunakan versi Go terbaru
          cache: true

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Auto-Generate Dependencies
        run: |
          # Bersihkan file lama agar tidak konflik versi
          rm -f go.mod go.sum
          
          # Inisialisasi module baru dengan Go 1.25
          go mod init wgengine
          
          # Ambil library terbaru dengan flag -u (update)
          go get -u golang.zx2c4.com/wireguard
          go get -u golang.org/x/mobile/bind
          
          # Rapikan dependensi
          go mod tidy

      - name: Build AAR
        run: |
          # Pastikan binary go/bin masuk dalam PATH
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # Build untuk Redmi 10A (arm) dan HP modern (arm64)
          # Flag -androidapi 21 memastikan kompatibilitas luas
          gomobile bind -v -target=android/arm,android/arm64 -androidapi 21 -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine-library
          path: wgengine.aar
