name: Build WG Engine

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Menggunakan 1.23 yang stabil untuk gomobile
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          export PATH=$(go env GOPATH)/bin:$PATH
          gomobile init

      - name: Prepare Dependencies
        run: |
          # Hapus go.mod lama dan buat baru
          rm -f go.mod go.sum
          go mod init main 
          
          # Ambil dependensi untuk Wireguard dan Mobile Bind
          go get golang.zx2c4.com/wireguard@latest
          go get golang.org/x/mobile/bind@latest
          
          go mod tidy

      - name: Build AAR
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          
          # PENTING: Target build adalah folder ./wgengine
          gomobile bind -v \
            -target=android \
            -androidapi 21 \
            -o wgengine.aar ./wgengine

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine
          path: wgengine.aar
