name: Build WG Engine
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Versi 1.23 sangat stabil untuk gomobile saat ini
          cache: true

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Force Fetch & Vendor
        run: |
          rm -f go.mod go.sum
          go mod init wgengine
          # Ambil library secara spesifik
          go get golang.org/x/mobile/bind
          go get golang.zx2c4.com/wireguard
          go mod tidy
          # Trik Utama: Masukkan semua source code library ke folder 'vendor'
          # Ini memaksa gomobile untuk membaca file secara lokal
          go mod vendor

      - name: Build AAR
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          # Gunakan flag -mod=vendor agar gomobile tidak mencari ke internet lagi
          gomobile bind -v -target=android/arm,android/arm64 -androidapi 21 -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine-library
          path: wgengine.aar
