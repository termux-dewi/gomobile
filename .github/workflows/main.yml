name: Build WireGuard gRPC AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Supaya bisa build manual dari web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Versi stabil untuk gomobile

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        # GitHub Runner sudah punya NDK, kita tinggal panggil r26b/d

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Initialize Gomobile
        run: gomobile init

      - name: Go Mod Tidy
        run: |
          go mod init vpnengine || true
          go mod tidy

      - name: Build Fat AAR (ARM & ARM64)
        run: |
          # Perintah Ubuntu Full Command
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk-bundle
          gomobile bind -target android/arm,android/arm64 -androidapi 21 -v -o vpnengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpnengine-aar
          path: vpnengine.aar
