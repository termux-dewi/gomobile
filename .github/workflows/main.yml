name: Build WireGuard gRPC AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        run: |
          # Cari NDK terbaru secara dinamis
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV
          echo "Using NDK at $NDK_PATH"

      - name: Install Tools & Dependencies
        run: |
          # Install gomobile & gobind
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # Force download mobile bind package ke cache
          go get golang.org/x/mobile/bind
          
          # Daftarkan binary ke PATH
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Prepare Go Module
        run: |
          # Reset module agar bersih dari path lokal
          rm -f go.mod go.sum
          go mod init vpnengine
          
          # Ambil semua dependency yang dibutuhkan
          go get golang.zx2c4.com/wireguard
          go get google.golang.org/grpc
          go get golang.org/x/mobile/bind
          go mod tidy
          
          # Inisialisasi gomobile (Wajib setelah go get bind)
          $(go env GOPATH)/bin/gomobile init

      - name: Build Fat AAR (ARM & ARM64)
        run: |
          export ANDROID_NDK_HOME=${{ env.NDK_PATH }}
          # Build menggunakan package mode (titik di akhir)
          gomobile bind -target android/arm,android/arm64 -androidapi 21 -v -o vpnengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpnengine-aar
          path: vpnengine.aar
