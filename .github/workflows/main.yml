name: Build WireGuard gRPC AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Setup Android NDK
        id: setup-ndk
        run: |
          # Mengambil versi NDK terbaru yang terinstall di runner
          ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          echo "NDK_PATH=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "Menggunakan NDK di: $ANDROID_NDK_HOME"

      - name: Initialize Gomobile
        run: gomobile init

      - name: Go Mod Tidy
        run: |
          go mod init vpnengine || true
          go mod tidy

      - name: Build Fat AAR (ARM & ARM64)
        run: |
          # Gunakan variabel NDK_PATH yang sudah kita cari tadi
          export ANDROID_NDK_HOME=${{ env.NDK_PATH }}
          gomobile bind -target android/arm,android/arm64 -androidapi 21 -v -o vpnengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpnengine-aar
          path: vpnengine.aar
