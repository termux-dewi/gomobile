name: Build WG Engine
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # Matikan cache sementara untuk menghindari file rusak

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Init Go Module & Fetch Deps
        run: |
          if [ ! -f go.mod ]; then
            go mod init wgengine
          fi
          # Paksa download x/mobile dan wireguard
          go get golang.org/x/mobile/bind
          go get golang.zx2c4.com/wireguard
          go mod tidy
          go mod download

      - name: Build AAR
        run: |
          # Tambahkan path go/bin agar gobind terbaca
          export PATH=$PATH:$(go env GOPATH)/bin
          # Jalankan bind dengan verbose (-v) untuk melihat proses detail
          gomobile bind -v -target=android/arm,android/arm64 -androidapi 21 -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine-library
          path: wgengine.aar
