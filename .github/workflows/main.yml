name: Build WG Engine

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          export PATH=$(go env GOPATH)/bin:$PATH
          gomobile init

      - name: Prepare Workspace & Vendor
        run: |
          rm -f go.mod go.sum
          go mod init wgengine
          
          # Ambil library terbaru
          go get golang.zx2c4.com/wireguard@latest
          go get golang.org/x/mobile/bind@latest
          
          go mod tidy
          # Membuat folder vendor secara lokal
          go mod vendor

      - name: Build AAR
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          
          # TRICK: Gunakan GOFLAGS untuk memaksa mode vendor di dalam gomobile
          export GOFLAGS="-mod=vendor"
          
          # Hapus flag -mod dari perintah gomobile bind
          gomobile bind -v \
            -target=android \
            -androidapi 21 \
            -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine
          path: wgengine.aar
