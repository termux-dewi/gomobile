name: Build WG Engine
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Init Go Module
        run: |
          go mod init wgengine
          go get golang.zx2c4.com/wireguard
          go get golang.org/x/mobile/bind

      - name: Build AAR
        run: |
          # Build untuk arm (32-bit) dan arm64
          gomobile bind -target=android/arm,android/arm64 -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: wgengine-library
          path: wgengine.aar
