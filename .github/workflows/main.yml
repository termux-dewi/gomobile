name: Build WG Engine
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Update ke versi terbaru untuk mendukung library x/mobile
          cache: true

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Fetch Dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build AAR
        run: |
          # Tambahkan binary go ke PATH
          export PATH=$PATH:$(go env GOPATH)/bin
          # Build target arm & arm64
          gomobile bind -v -target=android/arm,android/arm64 -androidapi 21 -o wgengine.aar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgengine-library
          path: wgengine.aar
